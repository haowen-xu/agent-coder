app:
  name: agent-coder
  env: dev

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  shutdown_timeout: 10s

log:
  level: info
  format: text
  add_source: false

db:
  enabled: true
  driver: sqlite
  sqlite_path: agent-coder.db
  postgres_dsn: ""
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: 30m
  auto_migrate: true

secret:
  provider: env
  env_prefix: AGENT_CODER_SECRET_

auth:
  session_ttl: 72h

work:
  work_dir: .agent-coder/workdirs

agent:
  provider: codex
  codex:
    binary: codex
    sandbox: true
    timeout_sec: 7200
    max_retry: 5
    max_loop_step: 5

scheduler:
  enabled: true
  poll_interval_sec: 30
  run_every: 30s

issue_provider:
  http_timeout_sec: 30

bootstrap:
  admin_username: admin
  admin_password: admin123
